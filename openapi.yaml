openapi: 3.1.0
info:
  title: Pet Clinic API
  description: REST API for the VetCare pet clinic application.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        application:
          type: string
          example: backend
    LoginRequestDto:
      type: object
      properties:
        usernameOrEmail:
          type: string
          example: user@clinic.com
        password:
          type: string
          format: password
          example: secret123
      required:
        - usernameOrEmail
        - password
    LoginResponseDto:
      type: object
      properties:
        success:
          type: boolean
          example: true
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        message:
          type: string
          example: Login successful.
    OwnerRequestDto:
      type: object
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        address:
          type: string
          example: 123 Main St
        city:
          type: string
          example: Springfield
        telephoneNumber:
          type: string
          example: 5551234567
      required:
        - firstName
        - lastName
        - address
        - city
        - telephoneNumber
    OwnerResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        address:
          type: string
          example: 123 Main St
        city:
          type: string
          example: Springfield
        telephoneNumber:
          type: string
          example: 5551234567
    PetRequestDto:
      type: object
      properties:
        name:
          type: string
          example: Fido
        birthDate:
          type: string
          format: date
          example: 2020-05-10
        ownerId:
          type: integer
          format: int64
          example: 1
        petTypeId:
          type: integer
          format: int64
          example: 2
      required:
        - name
        - birthDate
        - ownerId
        - petTypeId
    PetResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 3
        name:
          type: string
          example: Fido
        birthDate:
          type: string
          format: date
          example: 2020-05-10
        ownerId:
          type: integer
          format: int64
          example: 1
        petTypeId:
          type: integer
          format: int64
          example: 2
        petTypeName:
          type: string
          example: Dog
    PetTypeResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 2
        name:
          type: string
          example: Dog
    VeterinarianResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 4
        firstName:
          type: string
          example: Ava
        lastName:
          type: string
          example: Smith
        specialty:
          type: string
          example: Surgery
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-05-30T15:00:00Z'
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: 'Validation failed for field...'
paths:
  /health:
    get:
      summary: Health check
      description: Returns application health status.
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/login:
    post:
      summary: Login
      description: Authenticate a user and return a JWT access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDto'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDto'
  /api/owners:
    post:
      summary: Create owner
      description: Create a new owner record.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerRequestDto'
      responses:
        '201':
          description: Owner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/owners/{id}:
    get:
      summary: Get owner by id
      description: Retrieve owner details by identifier.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Owner found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerResponseDto'
        '400':
          description: Invalid owner id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Owner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/pets:
    post:
      summary: Create pet
      description: Create a new pet record.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetRequestDto'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/pets/{id}:
    get:
      summary: Get pet by id
      description: Retrieve pet details by identifier.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Pet found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetResponseDto'
        '400':
          description: Invalid pet id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/pet-types:
    get:
      summary: List pet types
      description: Retrieve a list of all supported pet types.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pet type list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PetTypeResponseDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/veterinarians:
    get:
      summary: List veterinarians
      description: Retrieve a list of all veterinarians.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Veterinarian list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VeterinarianResponseDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
security:
  - BearerAuth: []
