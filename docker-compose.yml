services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: petclinic
      MYSQL_ROOT_PASSWORD: root1
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/petclinic
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1
      NOTIFICATION_SMS_ENABLED: "${NOTIFICATION_SMS_ENABLED:-false}"
      NOTIFICATION_SMS_COUNTRY_CODE: "${NOTIFICATION_SMS_COUNTRY_CODE:-+91}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER:-}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_TARGET: http://backend:8080
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
